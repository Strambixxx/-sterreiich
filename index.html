<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Österreicher Counter</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: transparent;
    font-family: 'Arial Black', 'DejaVu Sans', Impact, sans-serif;
    padding: 20px;
  }
  
  .banner {
    display: inline-flex;
    align-items: center;
    gap: 20px;
  }
  
  .flag {
    width: 90px;
    height: 60px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 
      0 0 0 3px #fff,
      0 6px 16px rgba(0, 0, 0, 0.6);
  }
  
  .flag div { flex: 1; }
  
  .text {
    color: #fff;
    font-size: 60px;
    font-weight: 900;
    text-shadow: 
      4px 4px 0 #000,
      -2px -2px 0 #000,
      2px -2px 0 #000,
      -2px 2px 0 #000,
      2px 2px 0 #000,
      0 0 12px rgba(0, 0, 0, 0.8);
    white-space: nowrap;
    line-height: 1;
    letter-spacing: 1px;
  }
  
  .count {
    transition: transform 0.2s;
    display: inline-block;
  }
  
  .count.update { transform: scale(1.3); }
  
  .austrian {
    color: #ed2939;
  }
</style>
</head>
<body>
  <div class="banner">
    <div class="flag">
      <div style="background:#ed2939"></div>
      <div style="background:#fff"></div>
      <div style="background:#ed2939"></div>
    </div>
    <span class="text">Gerade sind <span class="count" id="counter">0</span> <span class="austrian">Österreicher</span> im Chat</span>
  </div>

<script>
  const counter = document.getElementById('counter');
  let currentCount = 0;
  
  function updateCount(newCount) {
    if (newCount !== currentCount) {
      currentCount = newCount;
      counter.textContent = newCount;
      counter.classList.add('update');
      setTimeout(() => counter.classList.remove('update'), 200);
    }
  }
  
  function connect() {
    try {
      const ws = new WebSocket('ws://localhost:21213/');
      ws.onopen = () => console.log('TikFinity verbunden');
      ws.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          if (data.event === 'roomUser' && data.data) {
            if (data.data.viewerCount !== undefined) updateCount(data.data.viewerCount);
          } else if (data.event === 'viewerCount' && data.data !== undefined) {
            updateCount(data.data);
          } else if (data.viewerCount !== undefined) {
            updateCount(data.viewerCount);
          }
        } catch(e) {}
      };
      ws.onclose = () => setTimeout(connect, 3000);
      ws.onerror = () => ws.close();
    } catch(e) {
      setTimeout(connect, 3000);
    }
  }
  connect();
</script>
</body>
</html>
